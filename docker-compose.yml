version: "3.9"

services:
  apache:
    image: httpd:2.4
    container_name: apache_server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./filesServer:/usr/local/apache2/htdocs
    restart: always   # se reinicia siempre al arrancar el sistema

  php:
    image: php:8.4-apache
    container_name: php_server
    volumes:
      - ./Host:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini  
    restart: always   # lo mismo

  mysql:
    image: mysql:9.2
    container_name: mysql_server
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: userpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-conf/my.cnf:/etc/mysql/conf.d/my.cnf  
    restart: always   # mantiene la base activa

volumes:
  mysql_data: