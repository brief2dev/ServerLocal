version: "3.9"

services:
  php-apache:
    image: php:8.4-apache
    container_name: apache24Dev
    ports:
      - "8080:80"
    volumes:
      - ./Host:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
    restart: always

  mysql:
    image: mysql:9.2
    container_name: sqlService
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: userpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./my.cnf:/etc/mysql/conf.d/my.cnf
    restart: always

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: sqlMyAdmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: user
      PMA_PASSWORD: userpass
      MYSQL_ROOT_PASSWORD: rootpass

volumes:
  mysql_data: