version: "3.9"

services:
  app:
    build: .
    labels:
      - "project=igrip"
      - "municipio=se"
      - "municipio_nombre=Santa Elena"
      - "service=app"
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./host:/var/www/html:rw
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./apache.conf:/etc/apache2/conf-enabled/000-custom.conf
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html/public
    restart: unless-stopped
    networks:
      - infra_net

  mysql:
    image: mysql:8.0
    labels:
      - "project=igrip"
      - "municipio=se"
      - "municipio_nombre=Santa Elena"
      - "service=database"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./dataBases:/docker-entrypoint-initdb.d 
      - ./my.cnf:/etc/mysql/conf.d/my.cnf
    restart: unless-stopped
    networks:
      - infra_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - infra_net

volumes:
  db_data:

networks:
  infra_net:
    external: true